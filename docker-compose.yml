version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tally-db
    env_file: ./backend/.env.docker
    volumes:
      - ./db_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: tally-backend
    env_file: ./backend/.env.docker
    depends_on:
      - postgres
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: tally-nginx
    ports:
      - "48780:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
